<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B2B Guest Registration Portal</title>
    <script src="https://alcdn.msauth.net/browser/2.19.0/js/msal-browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 100%; max-width: 400px; }
        .btn { background: #0078d4; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        .success { color: #107c10; display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Partner Portal Access</h2>
        <p>Register using your corporate or personal email to join as a guest.</p>
        <button id="authBtn" class="btn" onclick="startB2BFlow()">Register / Sign In</button>
        <div id="welcome" class="success">
            <h3>Registration Verified!</h3>
            <p id="userName"></p>
            <p>Directing to partner resources...</p>
        </div>
    </div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "bf9a3574-ba33-4ad0-9983-8587d6972ca6",
                authority: "https://login.microsoftonline.com/f2c246b1-4fa5-4443-aed3-814c76b2cb0c",
                knownAuthorities: ["login.microsoftonline.com"],
                redirectUri: window.location.origin + "/" 
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // Handle the return from the B2B User Flow
        msalInstance.handleRedirectPromise().then(response => {
            if (response) {
                console.log("B2B Auth Success:", response);
                document.getElementById('authBtn').style.display = 'none';
                document.getElementById('welcome').style.display = 'block';
                document.getElementById('userName').innerText = response.account.name || response.account.username;
                
                // Final Landing Page (as per blog strategy)
                setTimeout(() => { window.location.href = "https://www.chanceofsecurity.com"; }, 4000);
            }
        }).catch(e => console.error("B2B Auth Error:", e));

        function startB2BFlow() {
            msalInstance.loginRedirect({
                scopes: ["openid", "profile"],
                extraQueryParameters: { 
                    p: "B2X_1_SignUp", // Must match your User Flow name
                    prompt: "select_account"
                }
            });
        }
    </script>
</body>
</html>
