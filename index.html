<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      margin: 1rem;
    }
    h1 { color: #2c3e50; margin-bottom: 1rem; }
    p { color: #34495e; line-height: 1.6; }
  </style>
  <title>Cloudy With a Chance Of Security</title>
  <script src="https://alcdn.msauth.net/browser/2.19.0/js/msal-browser.min.js"></script>
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>Welcome to Cloudy With a Chance Of Security! 🚀</h1>
        <p>This is your default landing page.</p>
        <p>The authentication logic is now passive. You are seeing this because the auto-redirect has been disabled.</p>
    </div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "bf9a3574-ba33-4ad0-9983-8587d6972ca6",
                authority: "https://login.microsoftonline.com/f2c246b1-4fa5-4443-aed3-814c76b2cb0c",
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // We still handle the promise in case a user comes back FROM a login,
        // but we removed the "msalInstance.loginRedirect" call that was causing the loop.
        msalInstance.handleRedirectPromise()
            .then(response => {
                if (response) {
                    console.log("User is logged in:", response.account.username);
                } else {
                    console.log("No active session, but staying on page.");
                }
            })
            .catch(error => { console.error(error); });
    </script>
</body>
</html>
