<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Portal — Signing you in...</title>

  <!--
    ══════════════════════════════════════════════════════
    HOW THIS WORKS
    ══════════════════════════════════════════════════════
    This page immediately redirects the user to Microsoft
    Entra's hosted sign-up/sign-in page for your B2B user
    flow. No MSAL, no CDN, no JavaScript library needed.

    Entra handles the full sign-up experience:
      • Email entry
      • IDP detection / federation
      • Google / Microsoft account sign-in
      • OTP fallback for unknown domains
      • Attribute collection
      • Guest account creation

    After sign-up/sign-in, Entra redirects back to your
    app at the redirect_uri with an authorization code.
    ══════════════════════════════════════════════════════

    CONFIGURATION — update the 4 values below:
  -->
  <script>
    const CLIENT_ID    = "bf9a3574-ba33-4ad0-9983-8587d6972ca6";
    const TENANT_ID    = "f2c246b1-4fa5-4443-aed3-814c76b2cb0c";
    const USER_FLOW    = "B2X_1_SignUp";
    const REDIRECT_URI = window.location.origin + "/callback.html";

    // PKCE helpers — required because app is registered as SPA platform in Entra
    function generateRandomString(length) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      const array = new Uint8Array(length);
      crypto.getRandomValues(array);
      return Array.from(array).map(b => chars[b % chars.length]).join('');
    }

    async function generateCodeChallenge(verifier) {
      const data = new TextEncoder().encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function startLogin() {
      const codeVerifier  = generateRandomString(64);
      const codeChallenge = await generateCodeChallenge(codeVerifier);

      // Persist verifier so callback.html can exchange the code
      sessionStorage.setItem('pkce_verifier', codeVerifier);

      const params = new URLSearchParams({
        client_id:             CLIENT_ID,
        response_type:         "code",
        response_mode:         "query",
        redirect_uri:          REDIRECT_URI,
        scope:                 "openid profile email",
        p:                     USER_FLOW,
        nonce:                 crypto.randomUUID(),
        state:                 generateRandomString(16),
        code_challenge:        codeChallenge,
        code_challenge_method: "S256",
      });

      const url = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?${params}`;
      document.getElementById('manualLink').href = url;
      window.location.replace(url);
    }

    startLogin();
  </script>

  <!-- Fallback UI shown only if JS is disabled -->
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0;
      background: #f3f2f1; color: #323130;
    }
    .box {
      text-align: center; padding: 40px;
      background: #fff; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 360px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #edebe9;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #0078d4; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Redirecting to sign-in...</p>
    <p style="font-size:13px;color:#605e5c;margin-top:8px;">
      Not redirecting? <a id="manualLink" href="#">Click here</a>
    </p>
  </div>
  
</body>
</html>
